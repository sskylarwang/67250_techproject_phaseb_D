<!DOCTYPE html>
<html>
<head>
    <meta name="author" content="Skylar Wang">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>Checkout | MonoMuse</title>

    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <script src="../static/script.js" defer></script>
</head>
<body onload="addYear()">
    <header>
        <h1>Checkout</h1>
        <nav>
            <a href="../index.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="exhibitions.html">Exhibitions</a>
            <a href="tickets.html">Buy Tickets</a>
            <a id="navselected" href="checkout.html">Checkout</a>
        </nav>
    </header>

    <div class="main">
        <h2>Complete Your Ticket Order</h2>

        <form action="#" method="get">
            <p>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required>
            </p>

            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required>
            </p>

            <p>
                <label for="quantity">Ticket Quantity:</label><br>
                <input type="number" id="quantity" name="quantity" min="1" required>
            </p>

            <p>
                <input type="submit" value="Submit">
            </p>
        </form>
    </div>

    <footer>
        <p id="copyYear"></p>
    </footer>


</body>
</html>
